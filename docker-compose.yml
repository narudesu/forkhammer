services:
  forkhammer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ALPINE_VERSION: "3.20"
        BUN_VERSION: "1.3.14"
        OPENCODE_REF: "forkhammer-v5"
        OPENCODE_USER: ${USER}
    container_name: forkhammer
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      XDG_DATA_HOME: /home/${USER}/code/forkhammer
      XDG_CONFIG_HOME: /home/${USER}/code/forkhammer/config
      FORKHAMMER_STATE_DIR: /home/${USER}/.local/state/forkhammer
      DEBUG: "app:*"
      DEBUG_COLORS: "1"
      FORCE_COLOR: "1"
    volumes:
      - ${HOME}/code/forkhammer:/home/${USER}/code/forkhammer
      - ${HOME}/.config/forkhammer:/home/${USER}/.config/forkhammer:ro
      - ${HOME}/.local/state/forkhammer:/home/${USER}/.local/state/forkhammer
